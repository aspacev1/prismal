name: flowline-app

services:
  app:
    image: flowline-app-prod
    build:
      context: .
      target: runner
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:

volumes:
  postgres_data:
  caddy_data:

# Manual backup (run from the host, with the stack up):
#   docker compose exec -T postgres pg_dump -U ${POSTGRES_USER} ${POSTGRES_DB} > backup-$(date +%F).sql
# Restore:
#   docker compose exec -T postgres psql -U ${POSTGRES_USER} ${POSTGRES_DB} < backup-YYYY-MM-DD.sql
# Scheduled/automated backups are out of scope for this phase.
